apiVersion: v1
kind: Namespace
metadata:
  name: nginx-ns

---

apiVersion: v1
kind: Pod
metadata:
  name: nginx-ns-pod
  namespace: nginx-ns
  labels:
    app: nginx-ns-pod
spec:
  containers:
  - name: nginx-ns-pod
    image: nginx
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
      
    imagePullPolicy: IfNotPresent
  
---

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: nginx-ns
spec:
  selector:
    app: nginx-ns-pod
  ports:
  - port: 80        # service port
    targetPort: 80   # container port
  type: ClusterIP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx-ns
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx-ns-pod

  template:
    metadata:
      labels:
        app: nginx-ns-pod

    spec:
      containers:
      - name: nginx-deployment
        image: nginx
        imagePullPolicy: IfNotPresent

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"

        ports:
        - containerPort: 80

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-daemonset
  namespace: nginx-ns
  labels:
    app: nginx

spec:
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"