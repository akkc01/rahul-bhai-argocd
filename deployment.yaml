apiVersion: apps/v1
kind: Deployment
metadata:
  name: rahul-deployment
spec:
  selector:
    matchLabels:
      app: rahul-deployment
  template:
    metadata:
      labels:
        app: rahul-deployment
    spec:
      containers:
      - name: rahul-nginx
        image: nginx:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
